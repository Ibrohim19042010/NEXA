<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXA - Premium Anime Platform</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-theme">

    <main id="app" class="app-container">
        <div class="initial-loader">
            <i class="fas fa-spinner fa-spin loading-icon"></i>
            <p>NEXA ishga tushmoqda...</p>
        </div>
    </main>

    <nav class="bottom-nav-glass" id="bottom-navigation">
        <button class="nav-item active" onclick="handleNavClick('home', this)">
            <i class="fas fa-home"></i> <span>Asosiy</span>
        </button>
        <button class="nav-item" onclick="handleNavClick('anime', this)">
            <i class="fas fa-compass"></i> <span>Katalog</span>
        </button>
        <button class="nav-item" onclick="handleNavClick('quiz', this)">
            <i class="fas fa-brain"></i> <span>Viktorina</span>
        </button>
        <button class="nav-item" onclick="handleNavClick('chat', this)">
            <i class="fas fa-comments"></i> <span>Chat</span>
        </button>
        <button class="nav-item" onclick="handleNavClick('profile', this)">
            <i class="fas fa-user"></i> <span>Profil</span>
        </button>
    </nav>

    <script>
        function handleNavClick(pageName, element) {
            if (window.navigateToPage) window.navigateToPage(pageName);
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }
    </script>

    <script type="module" src="js/app.js"></script>
</body>
</html>
