<!DOCTYPE html>
<html lang="uz">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="theme-color" content="#0B0B0B">

    <meta name="description"
        content="NEXA Premium Anime Platform">

    <title>NEXA</title>

    <!-- Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/anime.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/quiz.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="stylesheet" href="css/leaderboard.css">
    <link rel="stylesheet" href="css/achievement.css">
    <link rel="stylesheet" href="css/premium.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- Loading Screen -->

    <div id="loading-screen">

        <div class="loader">

            <div class="loader-logo">

                ⚔️

            </div>

            <h1>NEXA</h1>

            <p>Shadow System Loading...</p>

            <div class="loading-bar">

                <div id="loading-progress"></div>

            </div>

        </div>

    </div>

    <!-- App -->

    <div id="app">

        <!-- Header -->

        <header id="header"></header>

        <!-- Main -->

        <main id="page-container">

        </main>

        <!-- Bottom Navigation -->

        <nav id="bottom-navigation">

            <button class="nav-btn active" data-page="home">

                <i class="fa-solid fa-house"></i>

                <span>Home</span>

            </button>

            <button class="nav-btn" data-page="anime">

                <i class="fa-solid fa-tv"></i>

                <span>Anime</span>

            </button>

            <button class="nav-btn" data-page="quiz">

                <i class="fa-solid fa-brain"></i>

                <span>Quiz</span>

            </button>

            <button class="nav-btn" data-page="chat">

                <i class="fa-solid fa-comments"></i>

                <span>Chat</span>

            </button>

            <button class="nav-btn" data-page="profile">

                <i class="fa-solid fa-user"></i>

                <span>Profile</span>

            </button>

        </nav>

    </div>

    <!-- Modal -->

    <div id="modal-container"></div>

    <!-- Firebase -->

    <script type="module" src="firebase/config.js"></script>

    <script type="module" src="firebase/database.js"></script>

    <script type="module" src="firebase/auth.js"></script>

    <!-- JS -->

    <script src="js/utils.js"></script>

    <script src="js/navigation.js"></script>

    <script src="js/app.js"></script>

    <script src="js/anime.js"></script>

    <script src="js/chat.js"></script>

    <script src="js/quiz.js"></script>

    <script src="js/profile.js"></script>

    <script src="js/premium.js"></script>

    <script src="js/coins.js"></script>

    <script src="js/rank.js"></script>

    <script src="js/achievement.js"></script>

    <script src="js/leaderboard.js"></script>

    <script src="js/admin.js"></script>

    <script src="js/assistant.js"></script>

    <script src="js/notification.js"></script>

</body>

</html>
