<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXA Anime</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="preloader" class="preloader">
        <i class="fas fa-spinner fa-spin"></i>
        <p>NEXA yuklanmoqda...</p>
    </div>

    <div id="app-container" style="display: none;">
        
        <main id="main-content">
            <div id="page-home" class="page-view active">
                <header class="profile-header">
                    <div class="profile-left">
                        <img src="assets/images/avatars/default.png" alt="Avatar" id="user-avatar" class="avatar-img">
                        <div class="user-info">
                            <h2 id="user-name">Ibrohim <i class="fas fa-check-circle verified-icon" style="color: #00D2FF; font-size: 14px;"></i></h2>
                            <p id="user-rank">E-Rank Hunter <span class="xp-text">0 / 100 XP</span></p>
                        </div>
                    </div>
                    <div class="profile-right">
                        <div class="coin-badge">
                            <i class="fas fa-coins"></i> <span id="user-coins">0</span>
                        </div>
                    </div>
                </header>

                <div class="content-padding">
                    <div class="grid-2-cols mt-20">
                        <div class="card action-card">
                            <h3><i class="fas fa-calendar-alt text-primary"></i> Daily Bonus</h3>
                            <p>7 kunlik mukofot</p>
                        </div>
                        <div class="card action-card">
                            <h3><i class="fas fa-tasks text-success"></i> Daily Mission</h3>
                            <p>0/3 bajarildi</p>
                        </div>
                    </div>

                    <section class="mt-20">
                        <h3 class="section-title"><i class="fas fa-play-circle"></i> Davom ettirish</h3>
                        <div class="card">
                            <p class="text-muted" style="font-size: 13px;">Hozircha chala ko'rilgan animelar yo'q.</p>
                        </div>
                    </section>
                </div>
            </div>

            <div id="page-catalog" class="page-view" style="display: none;">
                <div class="content-padding mt-20"><h2>Katalog</h2></div>
            </div>
            
            <div id="page-quiz" class="page-view" style="display: none;">
                <div class="content-padding mt-20"><h2>Viktorina</h2></div>
            </div>
            
            <div id="page-chat" class="page-view" style="display: none;">
                <div class="content-padding mt-20"><h2>Chat</h2></div>
            </div>
            
            <div id="page-profile" class="page-view" style="display: none;">
                <div class="content-padding mt-20"><h2>Profil</h2></div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-target="page-home">
                <i class="fas fa-home"></i><span>Asosiy</span>
            </a>
            <a href="#" class="nav-item" data-target="page-catalog">
                <i class="fas fa-compass"></i><span>Katalog</span>
            </a>
            <a href="#" class="nav-item center-nav" data-target="page-quiz">
                <div class="floating-btn"><i class="fas fa-gamepad"></i></div>
                <span class="mt-5">O'yin</span>
            </a>
            <a href="#" class="nav-item" data-target="page-chat">
                <i class="fas fa-comments"></i><span>Chat</span>
            </a>
            <a href="#" class="nav-item" data-target="page-profile">
                <i class="fas fa-user"></i><span>Profil</span>
            </a>
        </nav>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
