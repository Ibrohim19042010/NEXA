<!-- pages/anime.html -->

<div class="catalog-page-container">
    
    <!-- 1. Qidiruv va Janrlar bo'limi -->
    <header class="catalog-header">
        <div class="search-bar-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="anime-search-input" placeholder="Anime nomini yozing..." oninput="filterAnimeCatalog()">
        </div>
        
        <!-- Janr filtrlari -->
        <div class="genre-filter-scroll">
            <button class="genre-btn active" onclick="filterByGenre('all', this)">Hammasi</button>
            <button class="genre-btn" onclick="filterByGenre('Shounen', this)">Shounen</button>
            <button class="genre-btn" onclick="filterByGenre('Seinen', this)">Seinen</button>
            <button class="genre-btn" onclick="filterByGenre('Isekai', this)">Isekai</button>
            <button class="genre-btn" onclick="filterByGenre('Ongoing', this)">Ongoing</button>
        </div>
    </header>

    <!-- 2. Animelar ko'rinadigan asosiy Grid (Katalog) -->
    <section class="catalog-content">
        <h3 class="section-title">Barcha Animelar</h3>
        <div id="anime-catalog-grid" class="anime-cards-grid">
            <!-- Dynamic kartochkalar js/anime.js orqali shu yerga joylashadi -->
            <div class="page-loader">
                <i class="fas fa-circle-notch fa-spin loading-icon"></i>
                <p>Katalog yuklanmoqda...</p>
            </div>
        </div>
    </section>

    <!-- 3. DETALNIY MODAL OYNA (Anime ustiga bosganda ochiladigan Player) -->
    <div id="anime-details-modal" class="anime-modal overlay-backdrop hidden">
        <div class="modal-glass-content">
            
            <!-- Modalni yopish tugmasi -->
            <button class="close-modal-btn" onclick="closeAnimeModal()">
                <i class="fas fa-times"></i>
            </button>

            <!-- Anime Banner va Asosiy Ma'lumotlar -->
            <div class="modal-hero-banner" id="modal-anime-banner">
                <div class="banner-overlay">
                    <span class="premium-badge hidden" id="modal-anime-premium-tag">
                        <i class="fas fa-crown"></i> PREMIUM
                    </span>
                    <h2 id="modal-anime-title">Anime Nomlanishi</h2>
                    <p id="modal-anime-genres" class="modal-genres-list">Janrlar: Yuklanmoqda...</p>
                </div>
            </div>

            <!-- Video Pleyer hududi -->
            <div class="video-player-container">
                <div class="video-wrapper">
                    <iframe id="nexa-video-frame" src="" frameborder="0" allowfullscreen class="hidden"></iframe>
                    <div id="player-placeholder" class="player-placeholder-box">
                        <i class="fas fa-play-circle" onclick="startPlayingEpisode()"></i>
                        <p>Tomosha qilish uchun epizodni tanlang</p>
                    </div>
                </div>
            </div>

            <!-- Epizodlar Ro'yxati -->
            <div class="modal-episodes-section">
                <h3>Epizodlar</h3>
                <div id="modal-episodes-wrapper" class="episodes-btn-grid">
                    <!-- Epizod tugmalari js orqali dinamik chiqadi -->
                </div>
            </div>

            <!-- Anime Tavsifi -->
            <div class="modal-description-section">
                <h3>Sujet va Tavsif</h3>
                <p id="modal-anime-description">
                    Ushbu anime haqida qisqacha ma'lumotlar bazadan olinmoqda...
                </p>
            </div>

        </div>
    </div>

</div>

<!-- Ushbu sahifaga xos CSS stillar (dizayn buzilmasligi uchun) -->
<style>

    }

        color: #fff;

    }

        display: none;
    }
    .episode-tab-btn {
        padding: 10px 20px;
        background: rgba(255,255,255,0.06);

    }
    .episode-tab-btn:hover, .episode-tab-btn.active {
        background: #007bff;

    }
    .premium-badge {
        background: #ffd700;
        color: #000;
        padding: 3px 8px;
        font-size: 10px;
        font-weight: 700;
        border-radius: 4px;
        display: inline-block;
        margin-bottom: 8px;
        box-shadow: 0 0 8px rgba(255,215,0,0.5);
    }
    .modal-description-section h3, .modal-episodes-section h3 {
        font-size: 16px;
        margin-bottom: 10px;
        color: #ddd;
    }

        display: none !important;
